name: pedia_actual
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0' # Ajustado para máxima compatibilidad con paquetes estables

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- GESTIÓN DE ESTADO & ARQUITECTURA ---
  flutter_bloc: ^8.1.3      # Para manejar los eventos y estados de la agenda
  equatable: ^2.0.5         # Necesario para comparar las entidades y estados en el Bloc

  # --- INYECCIÓN DE DEPENDENCIAS ---
  get_it: ^7.6.0            # Service Locator para enlazar las capas de Clean Architecture

  # --- GOOGLE FIREBASE ---
  firebase_core: ^2.24.0    # Inicialización obligatoria de Firebase
  cloud_firestore: ^4.14.0  # Base de datos NoSQL para las citas e historias médicas

  table_calendar: ^3.1.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true